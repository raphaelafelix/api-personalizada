<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🙂 Character Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>😄 Explorador de Personagens</h1>
        <p class="subtitle">Consumindo nossa própria API em Node.js</p>

        <div class="fofo-area">
            <img src="" alt="Personagem" id="characterImage">
            <div id="typeName"></div>
        </div>

        <div class="controls">
            <button id="randomBtn">🎲 Personagem Aleatório</button>
        </div>

        <div class="search">
            <input
                type="text"
                id="typeInput"
                placeholder="Digite um nome (ex: snoopy, hello kitty, ou moranguinho)"
            >
            <button id="searchBtn">🔍 Buscar</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
